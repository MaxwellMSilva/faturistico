name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: file:./ci.db
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: faturistico-ci-secret
      AUTH_SECRET: faturistico-ci-secret
      CRYPTO_SECRET: faturistico-ci-secret-32-bytes

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Validar schema Prisma
        run: npx prisma validate

      - name: Compilar aplicação
        run: npm run build
